services:
  web:
    build: ./docker/php83
    container_name: lamp_php83_web
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./public:/var/www/html
      - ./docker/apache/ssl-vhost.conf:/etc/apache2/sites-available/000-default.conf
      - ./docker/certs:/etc/apache2/ssl
    depends_on:
      - db
      - phpmyadmin

  db:
    image: mariadb:10.11
    container_name: lamp_php83_db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: localdb
      MARIADB_USER: localuser
      MARIADB_PASSWORD: localpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lamp_php83_phpmyadmin
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: localuser
      PMA_PASSWORD: localpass
      PMA_ABSOLUTE_URI: https://localhost:8443/phpmyadmin/
    depends_on:
      - db

volumes:
  db_data:
